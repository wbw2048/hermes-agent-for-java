<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermes Agent - AI智能体</title>
    <!-- Markdown 渲染 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --accent: #0071e3;
            --accent-hover: #0077ed;
            --accent-active: #005bbf;
            --bg: #ffffff;
            --surface: #f5f5f7;
            --surface-elevated: #fafafa;
            --sidebar: #fbfbfd;
            --border: #e5e5e7;
            --border-subtle: #f0f0f2;
            --text: #1d1d1f;
            --text-secondary: #6e6e73;
            --text-tertiary: #86868b;
            --success: #34c759;
            --error: #ff3b30;
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 10px;
            --radius-xl: 14px;
            --fast: 0.15s ease;
            --normal: 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display',
                         'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            color: var(--text);
        }

        .app-wrapper {
            display: flex;
            width: 100%;
            height: 100vh;
            background: var(--bg);
            overflow: hidden;
        }

        /* ── 侧边栏 ── */
        .sidebar {
            width: 260px;
            background: var(--sidebar);
            color: var(--text);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            border-right: 1px solid var(--border);
        }

        .sidebar-header {
            padding: 16px 16px 12px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h2 {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 12px;
            letter-spacing: -0.008em;
        }

        .new-session-btn {
            width: 100%;
            padding: 8px 16px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: background-color var(--fast);
        }

        .new-session-btn:hover { background: var(--accent-hover); }
        .new-session-btn:active { background: var(--accent-active); }

        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .session-item {
            padding: 8px 12px;
            border-radius: var(--radius-md);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 2px;
            transition: background-color var(--fast);
        }

        .session-item:hover {
            background: var(--border-subtle);
        }

        .session-item.active {
            background: #e8e8ed;
            color: var(--text);
        }

        .session-icon {
            font-size: 14px;
            flex-shrink: 0;
            width: 14px;
            height: 14px;
            border: 1.5px solid #c7c7cc;
            border-radius: 3px;
            opacity: 0.5;
        }

        .session-item.active .session-icon {
            border-color: var(--accent);
            background: var(--accent);
            opacity: 1;
        }

        .session-info {
            flex: 1;
            min-width: 0;
        }

        .session-title {
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .session-time {
            font-size: 11px;
            color: var(--text-tertiary);
        }

        .session-actions {
            display: none;
            gap: 4px;
            flex-shrink: 0;
        }

        .session-item:hover .session-actions {
            display: flex;
        }

        .session-action-btn {
            background: none;
            border: none;
            color: var(--text-tertiary);
            cursor: pointer;
            font-size: 12px;
            padding: 2px 4px;
            border-radius: 4px;
            transition: color var(--fast), background-color var(--fast);
            line-height: 1;
        }

        .session-action-btn:hover {
            background: rgba(0,0,0,0.06);
            color: var(--text);
        }

        .session-action-btn.delete-btn:hover {
            background: rgba(255,59,48,0.08);
            color: var(--error);
        }

        /* ── 主区域 ── */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .header {
            background: var(--bg);
            color: var(--text);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            min-height: 52px;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.022em;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .action-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text);
            cursor: pointer;
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 500;
            transition: background-color var(--fast), border-color var(--fast);
            white-space: nowrap;
        }

        .action-btn:hover {
            background: var(--border-subtle);
            border-color: #d2d2d7;
        }

        .action-btn.hidden { display: none; }

        .current-session-info {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .status {
            background: none;
            color: var(--success);
            padding: 0;
            border-radius: 0;
            font-size: 12px;
            font-weight: 500;
        }

        .status::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
            margin-right: 6px;
            vertical-align: middle;
        }

        /* ── 模式切换 ── */
        .mode-toggle {
            font-size: 11px;
            font-weight: 600;
            color: var(--accent);
            cursor: pointer;
            padding: 2px 6px;
            border: 1px solid var(--accent);
            border-radius: 4px;
            user-select: none;
            transition: background-color var(--fast), color var(--fast);
        }
        .mode-toggle:hover {
            background: var(--accent);
            color: #fff;
        }
        .mode-toggle.sse-mode {
            color: var(--text-tertiary);
            border-color: var(--border);
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        /* ── 消息 ── */
        .message {
            max-width: 720px;
            padding: 4px 20px;
            line-height: 1.6;
            width: 100%;
        }

        .message-header {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-tertiary);
            margin-bottom: 4px;
            letter-spacing: 0.01em;
        }

        .user-message {
            align-self: flex-end;
            padding: 10px 16px;
            max-width: 70%;
            background: var(--accent);
            color: #fff;
            border-radius: 12px;
            border-bottom-right-radius: 4px;
        }

        .user-message .message-header {
            color: rgba(255,255,255,0.7);
        }

        .user-message .message-content a {
            color: rgba(255,255,255,0.9);
        }

        .assistant-message {
            align-self: flex-start;
            padding: 4px 20px;
            max-width: 100%;
            background: none;
            color: var(--text);
        }

        .assistant-message .message-header {
            color: var(--text-tertiary);
        }

        .system-message {
            align-self: center;
            padding: 6px 16px;
            max-width: 80%;
            background: var(--surface);
            border: none;
            color: var(--text-secondary);
            font-size: 13px;
            font-style: normal;
            font-weight: 400;
            text-align: center;
            border-radius: var(--radius-md);
        }

        /* Markdown 内容样式 */
        .message-content pre {
            background: var(--surface);
            color: var(--text);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            overflow-x: auto;
            font-size: 13px;
            line-height: 1.5;
            margin: 8px 0;
            border: 1px solid var(--border);
        }

        .message-content code {
            font-family: 'SF Mono', 'Fira Code', 'Menlo', monospace;
            font-size: 0.875em;
            background: var(--surface);
            padding: 2px 5px;
            border-radius: 4px;
            border: 1px solid var(--border);
        }

        .message-content pre code {
            background: none;
            padding: 0;
            border: none;
        }

        .message-content p { margin: 0.4rem 0; }
        .message-content ul, .message-content ol {
            padding-left: 1.2rem;
            margin: 0.3rem 0;
        }
        .message-content blockquote {
            border-left: 3px solid #d2d2d7;
            padding-left: 12px;
            margin: 8px 0;
            color: var(--text-secondary);
        }
        .message-content h1, .message-content h2, .message-content h3, .message-content h4 {
            margin: 0.6rem 0 0.3rem 0;
            font-weight: 600;
        }
        .message-content h1 { font-size: 1.2rem; }
        .message-content h2 { font-size: 1.1rem; }
        .message-content h3 { font-size: 1rem; }
        .message-content h4 { font-size: 0.95rem; }
        .message-content a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color var(--fast);
        }
        .message-content a:hover {
            border-bottom-color: var(--accent);
        }
        .message-content hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 0.8rem 0;
        }
        .message-content table {
            border-collapse: collapse;
            margin: 0.5rem 0;
            font-size: 0.9rem;
        }
        .message-content th, .message-content td {
            border: 1px solid var(--border);
            padding: 0.4rem 0.6rem;
        }
        .message-content th {
            background: var(--surface);
            font-weight: 600;
        }

        /* ── 工具调用卡片 ── */
        .tool-call-card {
            align-self: flex-start;
            max-width: 720px;
            width: 100%;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            overflow: hidden;
            background: var(--surface-elevated);
            transition: border-color var(--fast);
            margin: 0 20px;
        }

        .tool-call-card:hover {
            border-color: #d2d2d7;
        }

        .tool-call-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 13px;
            transition: background-color var(--fast);
            user-select: none;
        }

        .tool-call-header:hover {
            background: var(--border-subtle);
        }

        .tool-call-chevron {
            font-size: 10px;
            color: var(--text-tertiary);
            transition: transform 0.2s ease;
            flex-shrink: 0;
        }

        .tool-call-chevron.open {
            transform: rotate(90deg);
        }

        .tool-call-icon {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            opacity: 0.5;
            flex-shrink: 0;
        }

        .tool-call-card.status-done .tool-call-icon {
            background: var(--success);
            opacity: 0.7;
        }

        .tool-call-card.status-error .tool-call-icon {
            background: var(--error);
            opacity: 0.7;
        }

        .tool-call-name {
            font-family: 'SF Mono', 'Fira Code', 'Menlo', monospace;
            font-weight: 600;
            font-size: 12px;
            flex-shrink: 0;
        }

        .tool-call-args {
            font-family: 'SF Mono', 'Fira Code', 'Menlo', monospace;
            font-size: 12px;
            color: var(--text-tertiary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            min-width: 0;
        }

        .tool-call-status {
            flex-shrink: 0;
            font-size: 11px;
            font-weight: 500;
            color: var(--success);
        }

        .tool-call-card.status-error .tool-call-status {
            color: var(--error);
        }

        .tool-call-elapsed {
            font-size: 11px;
            color: var(--text-tertiary);
            font-family: 'SF Mono', 'Fira Code', monospace;
            flex-shrink: 0;
        }

        .tool-call-body {
            display: none;
            border-top: 1px solid var(--border);
            padding: 8px 12px;
            font-size: 12px;
        }

        .tool-call-body.open {
            display: block;
        }

        .tool-call-section {
            margin-bottom: 8px;
        }

        .tool-call-section:last-child {
            margin-bottom: 0;
        }

        .tool-call-label {
            font-size: 10px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-tertiary);
            margin-bottom: 4px;
        }

        .tool-call-value {
            font-family: 'SF Mono', 'Fira Code', 'Menlo', monospace;
            font-size: 12px;
            color: var(--text-secondary);
            white-space: pre-wrap;
            word-break: break-all;
            background: var(--surface);
            padding: 6px 8px;
            border-radius: 4px;
            max-height: 200px;
            overflow-y: auto;
        }

        .tool-call-value.error {
            color: var(--error);
            background: #fff5f5;
        }

        .tool-call-card.status-done {
            border-color: var(--border);
            background: var(--surface-elevated);
        }

        .tool-call-card.status-error {
            border-color: #ffd6d3;
            background: #fffbfb;
        }

        /* ── 输入区 ── */
        .input-area {
            padding: 16px 20px 20px;
            border-top: 1px solid var(--border);
            background: var(--bg);
        }

        .input-wrapper {
            display: flex;
            gap: 8px;
            max-width: 720px;
            margin: 0 auto;
        }

        #messageInput {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #d2d2d7;
            border-radius: var(--radius-lg);
            font-size: 15px;
            outline: none;
            transition: border-color var(--fast), box-shadow var(--fast);
            background: var(--sidebar);
        }

        #messageInput:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0,113,227,0.15);
        }

        #messageInput::placeholder {
            color: var(--text-tertiary);
        }

        #sendButton {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 0 18px;
            border-radius: var(--radius-lg);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color var(--fast);
            white-space: nowrap;
        }

        #sendButton:hover { background: var(--accent-hover); }
        #sendButton:active { background: var(--accent-active); }
        #sendButton:disabled {
            background: #d2d2d7;
            color: var(--text-tertiary);
            cursor: not-allowed;
        }

        /* ── 打字指示器 ── */
        .typing-indicator {
            display: none;
            padding: 8px 20px;
            align-self: flex-start;
            color: var(--text-tertiary);
            font-size: 13px;
        }

        .typing-dot {
            display: inline-block;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--text-tertiary);
            vertical-align: middle;
            animation: typingBounce 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; margin: 0 3px; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
            30% { opacity: 1; transform: translateY(-3px); }
        }

        /* ── 页脚 ── */
        .footer {
            padding: 8px 20px;
            background: var(--bg);
            border-top: 1px solid var(--border-subtle);
            text-align: center;
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .footer a {
            color: var(--text-tertiary);
            text-decoration: none;
            transition: color var(--fast);
        }

        .footer a:hover { color: var(--accent); }

        /* ── 响应式 ── */
        @media (max-width: 768px) {
            body { padding: 0; }
            .app-wrapper {
                flex-direction: column;
                height: 100vh;
            }
            .sidebar {
                width: 100%;
                flex-direction: column;
                border-right: none;
                border-bottom: 1px solid var(--border);
                max-height: 40vh;
            }
            .sidebar-header {
                padding: 12px 16px;
            }
            .session-list {
                display: flex;
                flex-direction: column;
                gap: 0;
                padding: 0;
                overflow-x: hidden;
                overflow-y: auto;
            }
            .session-item {
                white-space: normal;
                min-width: unset;
                padding: 10px 16px;
                border-radius: 0;
                border-bottom: 1px solid var(--border-subtle);
            }
            .message {
                max-width: 90%;
                padding-left: 16px;
                padding-right: 16px;
            }
            .tool-call-card {
                max-width: 90%;
                margin-left: 16px;
                margin-right: 16px;
            }
            .input-wrapper {
                max-width: none;
            }
            .input-area {
                padding: 12px 16px 16px;
            }
        }

        /* ── 弹窗 ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.visible { display: flex; }

        .modal {
            background: var(--bg);
            border-radius: var(--radius-xl);
            padding: 24px;
            width: 360px;
            max-width: 90vw;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }

        .modal h3 {
            margin-bottom: 16px;
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.022em;
        }

        .modal input,
        .modal textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d2d2d7;
            border-radius: var(--radius-md);
            font-size: 14px;
            outline: none;
            transition: border-color var(--fast), box-shadow var(--fast);
            font-family: inherit;
        }

        .modal input:focus,
        .modal textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0,113,227,0.15);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 16px;
        }

        .modal-btn {
            padding: 8px 16px;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: background-color var(--fast);
        }

        .modal-btn.cancel { background: var(--border-subtle); color: var(--text); }
        .modal-btn.cancel:hover { background: var(--border); }
        .modal-btn.confirm { background: var(--accent); color: #fff; }
        .modal-btn.confirm:hover { background: var(--accent-hover); }
        .modal-btn.danger { background: var(--error); color: #fff; }
        .modal-btn.danger:hover { background: #e0342b; }

        /* 人设弹窗样式 */
        .modal-wide { width: 560px; max-width: 95vw; }
        .persona-hint { font-size: 13px; color: var(--text-tertiary); margin: 0 0 12px; }
        #personaContent {
            width: 100%;
            min-height: 180px;
            padding: 12px;
            border: 1px solid #d2d2d7;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-family: inherit;
            line-height: 1.5;
            resize: vertical;
            outline: none;
        }
        #personaContent:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0,113,227,0.15);
        }
        .persona-status {
            font-size: 13px;
            margin-top: 8px;
            min-height: 1.2em;
        }
        .persona-status.error { color: var(--error); }
        .persona-status.ok { color: var(--success); }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>会话</h2>
                <button class="new-session-btn" id="newSessionBtn">+ 新建会话</button>
            </div>
            <div class="session-list" id="sessionList">
                <!-- 会话列表动态生成 -->
            </div>
        </div>

        <!-- 主区域 -->
        <div class="main-area">
            <div class="header">
                <h1>Hermes Agent</h1>
                <div class="header-right">
                    <button class="action-btn hidden" id="compressBtn" title="上下文压缩">压缩</button>
                    <button class="action-btn hidden" id="clearHistoryBtn" title="清除历史">清空</button>
                    <button class="action-btn" id="settingsBtn" title="人设设置">设置</button>
                    <span class="mode-toggle" id="modeToggle" title="切换传输模式">
                        <span class="mode-label" id="modeLabel">WS</span>
                    </span>
                    <span class="current-session-info" id="currentSessionInfo"></span>
                    <span class="status" id="connectionStatus">连接中</span>
                </div>
            </div>

            <div class="chat-container" id="chatContainer">
                <div class="message system-message">
                    <div class="message-header">系统</div>
                    <div class="message-content">
                        欢迎使用 Hermes Agent！基于 Spring Boot + Spring AI + SQLite 持久化。
                    </div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="messageInput" placeholder="输入您的问题..." autocomplete="off">
                    <button id="sendButton" disabled>发送</button>
                </div>
            </div>

            <div class="typing-indicator" id="typingIndicator">
                <span class="typing-dot"></span>
                <span class="typing-dot"></span>
                <span class="typing-dot"></span>
            </div>

            <div class="footer">
                <a href="/api/conversations/health" target="_blank">API 健康检查</a>
            </div>
        </div>
    </div>

    <!-- 标题编辑弹窗 -->
    <div class="modal-overlay" id="titleModal">
        <div class="modal">
            <h3>重命名会话</h3>
            <input type="text" id="titleInput" placeholder="输入新标题">
            <div class="modal-actions">
                <button class="modal-btn cancel" id="titleCancelBtn">取消</button>
                <button class="modal-btn confirm" id="titleConfirmBtn">确认</button>
            </div>
        </div>
    </div>

    <!-- 人设设置弹窗 -->
    <div class="modal-overlay" id="personaModal">
        <div class="modal modal-wide">
            <h3>AI 人设（SOUL.md）</h3>
            <p class="persona-hint">定义 AI 智能体的身份、沟通风格和行为准则。内容将在每次对话时注入系统提示。</p>
            <textarea id="personaContent" placeholder="例如：你是资深 Java 工程师，擅长代码审查，回复要简洁直接..."></textarea>
            <div class="persona-status" id="personaStatus"></div>
            <div class="modal-actions">
                <button class="modal-btn cancel" id="personaResetBtn">恢复默认</button>
                <button class="modal-btn cancel" id="personaCancelBtn">取消</button>
                <button class="modal-btn confirm" id="personaSaveBtn">保存</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/conversations';
        const WS_URL = 'ws://' + window.location.host + '/ws/agent';
        let currentSessionId = null;
        let sessionsCache = [];

        // ── WebSocket 客户端 ──
        let wsMode = 'ws'; // 'ws' or 'sse'
        let wsSocket = null;
        let wsReconnectTimer = null;
        let wsResolve = null; // Promise resolve for current response

        function connectWebSocket() {
            if (wsSocket && wsSocket.readyState === WebSocket.OPEN) return;
            if (wsSocket && wsSocket.readyState === WebSocket.CONNECTING) return;

            wsSocket = new WebSocket(WS_URL);

            wsSocket.onopen = () => {
                updateWsStatus('已连接', true);
                // 清除重连定时器
                if (wsReconnectTimer) { clearTimeout(wsReconnectTimer); wsReconnectTimer = null; }
            };

            wsSocket.onclose = () => {
                updateWsStatus('已断开', false);
                // 自动重连（5秒后）
                if (!wsReconnectTimer) {
                    wsReconnectTimer = setTimeout(() => {
                        if (wsMode === 'ws') connectWebSocket();
                    }, 5000);
                }
            };

            wsSocket.onerror = () => {
                updateWsStatus('连接错误', false);
            };

            wsSocket.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    handleWsMessage(msg);
                } catch (e) {
                    console.error('Failed to parse WS message:', e);
                }
            };
        }

        function updateWsStatus(text, ok) {
            if (wsMode !== 'ws') return;
            connectionStatus.textContent = text;
            connectionStatus.style.color = ok ? 'var(--success)' : 'var(--error)';
        }

        function handleWsMessage(msg) {
            if (!wsResolve) return;
            wsResolve(msg);
        }

        function sendViaWebSocket(sessionId, message) {
            return new Promise((resolve, reject) => {
                if (!wsSocket || wsSocket.readyState !== WebSocket.OPEN) {
                    reject(new Error('WebSocket 未连接'));
                    return;
                }
                wsResolve = (msg) => {
                    if (msg.type === 'done') {
                        wsResolve = null;
                        resolve(null);
                    } else if (msg.type === 'error') {
                        wsResolve = null;
                        reject(new Error(msg.data));
                    } else {
                        // text, tool_call, tool_result — handled by UI
                    }
                    processWsUIMessage(msg);
                };
                const payload = JSON.stringify({ type: 'chat', sessionId, message });
                wsSocket.send(payload);
            });
        }

        function processWsUIMessage(msg) {
            if (msg.type === 'text') {
                appendToAssistantBuffer(msg.data);
            } else if (msg.type === 'tool_call') {
                addToolCallCard({ toolName: msg.toolName, arguments: msg.arguments || '', result: null, elapsedMs: 0, error: null });
            } else if (msg.type === 'tool_result') {
                // 更新最后一个工具卡的结果
                const cards = document.querySelectorAll('.tool-call-card');
                if (cards.length > 0) {
                    const lastCard = cards[cards.length - 1];
                    const statusEl = lastCard.querySelector('.tool-call-status');
                    const iconEl = lastCard.querySelector('.tool-call-icon');
                    if (statusEl) statusEl.textContent = 'Done';
                    if (iconEl) iconEl.style.background = 'var(--success)';
                    lastCard.classList.add('status-done');
                    if (msg.result) {
                        const body = lastCard.querySelector('.tool-call-body');
                        if (body) {
                            const section = document.createElement('div');
                            section.className = 'tool-call-section';
                            section.innerHTML = `<div class="tool-call-label">结果</div><div class="tool-call-value">${escapeHtml(truncate(msg.result, 2000))}</div>`;
                            body.appendChild(section);
                        }
                    }
                    if (msg.elapsedMs) {
                        const elapsedEl = lastCard.querySelector('.tool-call-elapsed');
                        if (elapsedEl) elapsedEl.textContent = formatElapsed(msg.elapsedMs);
                    }
                }
            }
        }

        // DOM
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const typingIndicator = document.getElementById('typingIndicator');
        const connectionStatus = document.getElementById('connectionStatus');
        const sessionList = document.getElementById('sessionList');
        const currentSessionInfo = document.getElementById('currentSessionInfo');
        const newSessionBtn = document.getElementById('newSessionBtn');
        const compressBtn = document.getElementById('compressBtn');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');
        const titleModal = document.getElementById('titleModal');
        const titleInput = document.getElementById('titleInput');
        const titleCancelBtn = document.getElementById('titleCancelBtn');
        const titleConfirmBtn = document.getElementById('titleConfirmBtn');
        const settingsBtn = document.getElementById('settingsBtn');
        const personaModal = document.getElementById('personaModal');
        const personaContent = document.getElementById('personaContent');
        const personaStatus = document.getElementById('personaStatus');
        const personaSaveBtn = document.getElementById('personaSaveBtn');
        const personaCancelBtn = document.getElementById('personaCancelBtn');
        const personaResetBtn = document.getElementById('personaResetBtn');
        let editingSessionId = null;

        // Marked.js 配置
        if (typeof marked !== 'undefined') {
            marked.setOptions({
                breaks: true,
                gfm: true
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            checkHealth();
            setupEventListeners();
            loadModePreference();
        });

        async function checkHealth() {
            try {
                const r = await fetch(`${API_BASE}/health`);
                if (r.ok) {
                    const data = await r.json();
                    if (wsMode === 'sse') {
                        connectionStatus.textContent = '已连接';
                        connectionStatus.style.color = 'var(--success)';
                    }
                    sendButton.disabled = messageInput.value.trim() === '';
                    await loadSessions();
                    if (sessionsCache.length > 0) {
                        selectSession(sessionsCache[0].id);
                    } else {
                        createNewSession();
                    }
                } else {
                    connectionStatus.textContent = 'API 不可用';
                    connectionStatus.style.color = 'var(--error)';
                }
            } catch (e) {
                connectionStatus.textContent = '连接失败';
                connectionStatus.style.color = 'var(--error)';
            }
        }

        function setupEventListeners() {
            sendButton.addEventListener('click', sendMessage);
            messageInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            messageInput.addEventListener('input', () => {
                sendButton.disabled = messageInput.value.trim() === '';
            });
            newSessionBtn.addEventListener('click', createNewSession);
            compressBtn.addEventListener('click', handleCompress);
            clearHistoryBtn.addEventListener('click', handleClearHistory);

            // 模式切换
            const modeToggle = document.getElementById('modeToggle');
            modeToggle.addEventListener('click', toggleMode);

            // 弹窗
            titleCancelBtn.addEventListener('click', closeTitleModal);
            titleConfirmBtn.addEventListener('click', confirmRename);
            titleInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') { e.preventDefault(); confirmRename(); }
                if (e.key === 'Escape') closeTitleModal();
            });
            titleModal.addEventListener('click', (e) => {
                if (e.target === titleModal) closeTitleModal();
            });

            // 人设弹窗
            settingsBtn.addEventListener('click', openPersonaModal);
            personaCancelBtn.addEventListener('click', closePersonaModal);
            personaResetBtn.addEventListener('click', handlePersonaReset);
            personaSaveBtn.addEventListener('click', handlePersonaSave);
            personaContent.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closePersonaModal();
            });
            personaModal.addEventListener('click', (e) => {
                if (e.target === personaModal) closePersonaModal();
            });
        }

        // ── 会话管理 ──

        async function loadSessions() {
            try {
                const r = await fetch(API_BASE);
                if (r.ok) {
                    sessionsCache = await r.json();
                    renderSessionList();
                }
            } catch (e) {
                console.error('Load sessions failed:', e);
            }
        }

        function renderSessionList() {
            sessionList.innerHTML = '';
            for (const s of sessionsCache) {
                const div = document.createElement('div');
                div.className = 'session-item' + (s.id === currentSessionId ? ' active' : '');
                div.innerHTML = `
                    <span class="session-icon"></span>
                    <div class="session-info">
                        <div class="session-title">${escapeHtml(s.title || '新会话')}</div>
                        <div class="session-time">${formatTime(s.updatedAt)}</div>
                    </div>
                    <div class="session-actions">
                        <button class="session-action-btn rename-btn" data-id="${s.id}" title="重命名">&#x270E;</button>
                        <button class="session-action-btn delete-btn" data-id="${s.id}" title="删除">&#x2715;</button>
                    </div>
                `;
                div.querySelector('.session-info').addEventListener('click', () => selectSession(s.id));
                div.querySelector('.rename-btn').addEventListener('click', (e) => {
                    e.stopPropagation();
                    openTitleModal(s.id, s.title);
                });
                div.querySelector('.delete-btn').addEventListener('click', async (e) => {
                    e.stopPropagation();
                    if (confirm('确定删除此会话？')) {
                        await deleteSession(s.id);
                    }
                });
                sessionList.appendChild(div);
            }
        }

        async function createNewSession() {
            try {
                const r = await fetch(`${API_BASE}/session`, { method: 'POST' });
                if (r.ok) {
                    const session = await r.json();
                    currentSessionId = session.id;
                    chatContainer.innerHTML = '';
                    addMessageToChat('system', '新会话已创建');
                    updateSessionInfo();
                    updateActionButtons();
                    await loadSessions();
                    sendButton.disabled = messageInput.value.trim() === '';
                    messageInput.focus();
                    return;
                }
            } catch (e) {
                console.error('Create session failed:', e);
            }
            // 降级方案：前端生成 ID
            currentSessionId = generateSessionId();
            chatContainer.innerHTML = '';
            addMessageToChat('system', '新会话已创建');
            updateSessionInfo();
            renderSessionList();
            sendButton.disabled = messageInput.value.trim() === '';
            messageInput.focus();
        }

        async function selectSession(id) {
            currentSessionId = id;
            chatContainer.innerHTML = '';
            updateSessionInfo();
            updateActionButtons();
            renderSessionList();

            try {
                const r = await fetch(`${API_BASE}/${id}/history`);
                if (r.ok) {
                    const msgs = await r.json();
                    chatContainer.innerHTML = '';
                    if (msgs.length === 0) {
                        addMessageToChat('system', '此会话暂无历史消息');
                    } else {
                        for (const m of msgs) {
                            const role = m.messageType ? m.messageType.toLowerCase() : 'system';
                            if (role === 'user' || role === 'assistant') {
                                addMessageToChat(role, m.text || '');
                            } else if (role === 'tool') {
                                // 历史中的工具消息以系统消息展示
                                addMessageToChat('system', '[工具] ' + (m.text || ''));
                            }
                        }
                    }
                }
            } catch (e) {
                console.error('Load history failed:', e);
            }
            sendButton.disabled = messageInput.value.trim() === '';
            messageInput.focus();
        }

        async function deleteSession(id) {
            try {
                const r = await fetch(`${API_BASE}/${id}`, { method: 'DELETE' });
                if (r.ok) {
                    sessionsCache = sessionsCache.filter(s => s.id !== id);
                    renderSessionList();
                    if (currentSessionId === id) {
                        if (sessionsCache.length > 0) {
                            selectSession(sessionsCache[0].id);
                        } else {
                            createNewSession();
                        }
                    }
                }
            } catch (e) {
                console.error('Delete session failed:', e);
            }
        }

        function openTitleModal(id, currentTitle) {
            editingSessionId = id;
            titleInput.value = currentTitle || '';
            titleModal.classList.add('visible');
            setTimeout(() => titleInput.focus(), 100);
        }

        function closeTitleModal() {
            titleModal.classList.remove('visible');
            editingSessionId = null;
        }

        async function confirmRename() {
            if (!editingSessionId) return;
            const title = titleInput.value.trim();
            if (!title) return;

            try {
                const r = await fetch(`${API_BASE}/${editingSessionId}/title`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title })
                });
                if (r.ok) {
                    const sess = sessionsCache.find(s => s.id === editingSessionId);
                    if (sess) sess.title = title;
                    renderSessionList();
                    updateSessionInfo();
                }
            } catch (e) {
                console.error('Rename failed:', e);
            }
            closeTitleModal();
        }

        // ── 人设设置 ──

        async function openPersonaModal() {
            personaModal.classList.add('visible');
            personaStatus.textContent = '';
            personaStatus.className = 'persona-status';
            personaContent.value = '(加载中...)';
            personaContent.disabled = true;
            try {
                const r = await fetch('/api/settings/persona');
                if (r.ok) {
                    const data = await r.json();
                    personaContent.value = data.content || '';
                } else {
                    personaContent.value = '';
                }
            } catch (e) {
                personaContent.value = '';
                personaStatus.textContent = '加载失败: ' + e.message;
                personaStatus.className = 'persona-status error';
            }
            personaContent.disabled = false;
            setTimeout(() => personaContent.focus(), 100);
        }

        function closePersonaModal() {
            personaModal.classList.remove('visible');
        }

        async function handlePersonaSave() {
            const content = personaContent.value;
            if (!content.trim()) {
                personaStatus.textContent = '人设内容不能为空';
                personaStatus.className = 'persona-status error';
                return;
            }
            personaSaveBtn.disabled = true;
            personaStatus.textContent = '保存中...';
            personaStatus.className = 'persona-status';
            try {
                const r = await fetch('/api/settings/persona', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content })
                });
                const data = await r.json();
                if (r.ok && data.success) {
                    personaStatus.textContent = data.message || '已保存';
                    personaStatus.className = 'persona-status ok';
                    setTimeout(closePersonaModal, 800);
                } else {
                    personaStatus.textContent = data.message || '保存失败';
                    personaStatus.className = 'persona-status error';
                }
            } catch (e) {
                personaStatus.textContent = '保存失败: ' + e.message;
                personaStatus.className = 'persona-status error';
            } finally {
                personaSaveBtn.disabled = false;
            }
        }

        async function handlePersonaReset() {
            if (!confirm('确定删除人设文件，恢复默认身份？')) return;
            personaSaveBtn.disabled = true;
            try {
                const r = await fetch('/api/settings/persona', { method: 'DELETE' });
                const data = await r.json();
                if (r.ok && data.success) {
                    personaContent.value = '';
                    personaStatus.textContent = data.message || '已恢复默认';
                    personaStatus.className = 'persona-status ok';
                    setTimeout(closePersonaModal, 800);
                } else {
                    personaStatus.textContent = data.message || '重置失败';
                    personaStatus.className = 'persona-status error';
                }
            } catch (e) {
                personaStatus.textContent = '重置失败: ' + e.message;
                personaStatus.className = 'persona-status error';
            } finally {
                personaSaveBtn.disabled = false;
            }
        }

        function updateSessionInfo() {
            const sess = sessionsCache.find(s => s.id === currentSessionId);
            if (sess) {
                currentSessionInfo.textContent = sess.title || '新会话';
            } else {
                currentSessionInfo.textContent = currentSessionId ? currentSessionId.slice(0, 8) + '...' : '';
            }
        }

        function updateActionButtons() {
            // 有当前会话时才显示操作按钮
            const hasSession = currentSessionId != null && sessionsCache.length > 0;
            compressBtn.classList.toggle('hidden', !hasSession);
            clearHistoryBtn.classList.toggle('hidden', !hasSession);
        }

        // ── 压缩 & 清空历史 ──

        async function handleCompress() {
            if (!currentSessionId) return;
            try {
                const r = await fetch(`${API_BASE}/${currentSessionId}/compress`, { method: 'POST' });
                if (r.ok) {
                    const data = await r.json();
                    addMessageToChat('system', `上下文压缩完成：${data.messagesBefore} → ${data.messagesAfter} 条消息（删除 ${data.messagesRemoved} 条）`);
                } else {
                    addMessageToChat('system', '压缩失败，会话不存在');
                }
            } catch (e) {
                addMessageToChat('system', '压缩请求失败: ' + e.message);
            }
        }

        async function handleClearHistory() {
            if (!currentSessionId) return;
            if (!confirm('确定清除此会话的全部历史消息？')) return;
            try {
                const r = await fetch(`${API_BASE}/${currentSessionId}/history`, { method: 'DELETE' });
                if (r.ok) {
                    chatContainer.innerHTML = '';
                    addMessageToChat('system', '历史消息已清除');
                }
            } catch (e) {
                addMessageToChat('system', '清除历史失败: ' + e.message);
            }
        }

        // ── 发送消息（流式） ──

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || !currentSessionId) return;

            messageInput.value = '';
            sendButton.disabled = true;
            addMessageToChat('user', message);
            showTypingIndicator();

            // 重置全局助手消息缓冲
            currentAssistantBody = null;
            currentTextBuffer = '';

            // 创建助手消息气泡（流式渲染用）
            const assistantDiv = document.createElement('div');
            assistantDiv.className = 'message assistant-message';
            const header = document.createElement('div');
            header.className = 'message-header';
            header.textContent = '助手';
            const body = document.createElement('div');
            body.className = 'message-content';
            assistantDiv.appendChild(header);
            assistantDiv.appendChild(body);
            chatContainer.appendChild(assistantDiv);

            let textBuffer = '';

            function appendText(text) {
                textBuffer += text;
                if (typeof marked !== 'undefined') {
                    body.innerHTML = marked.parse(textBuffer);
                } else {
                    body.textContent = textBuffer;
                }
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }

            if (wsMode === 'ws') {
                // WebSocket 模式
                try {
                    await sendViaWebSocket(currentSessionId, message);
                } catch (e) {
                    hideTypingIndicator();
                    addMessageToChat('system', `WebSocket 错误: ${e.message}`);
                }
                hideTypingIndicator();
                await loadSessions();
                messageInput.focus();
                sendButton.disabled = messageInput.value.trim() === '';
                return;
            }

            // SSE 模式
            function handleSSEEvent(eventType, data) {
                if (eventType === 'tool') {
                    const tc = JSON.parse(data);
                    addToolCallCard(tc);
                } else if (eventType === 'text') {
                    appendText(data);
                } else if (eventType === 'done') {
                    hideTypingIndicator();
                } else if (eventType === 'error') {
                    hideTypingIndicator();
                    addMessageToChat('system', `错误: ${data}`);
                }
            }

            try {
                const response = await fetch(`${API_BASE}/stream`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, sessionId: currentSessionId })
                });

                if (!response.ok) {
                    hideTypingIndicator();
                    addMessageToChat('system', `错误: HTTP ${response.status}`);
                    return;
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let rawBuffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    rawBuffer += decoder.decode(value, { stream: true });
                    // SSE 事件以空行分隔
                    const parts = rawBuffer.split('\n\n');
                    rawBuffer = parts.pop(); // 保留未完成的片段

                    for (const part of parts) {
                        const lines = part.split('\n');
                        let eventType = 'message'; // SSE 默认事件类型
                        let dataLines = [];

                        for (const line of lines) {
                            const trimmed = line.trim();
                            if (!trimmed || trimmed.startsWith(':')) continue;

                            if (trimmed.startsWith('event:')) {
                                eventType = trimmed.slice(6).trim();
                            } else if (trimmed.startsWith('data:')) {
                                dataLines.push(trimmed.slice(5));
                            }
                        }

                        if (dataLines.length > 0) {
                            const data = dataLines.join('\n');
                            handleSSEEvent(eventType, data);
                        }
                    }
                }

            } catch (e) {
                hideTypingIndicator();
                addMessageToChat('system', `网络错误: ${e.message}`);
                return;
            }

            hideTypingIndicator();
            await loadSessions();
            messageInput.focus();
        }

        // ── UI 辅助 ──

        function addMessageToChat(role, content) {
            const div = document.createElement('div');
            div.className = `message ${role}-message`;
            const header = document.createElement('div');
            header.className = 'message-header';
            header.textContent = role === 'user' ? '用户' : role === 'assistant' ? '助手' : '系统';
            const body = document.createElement('div');
            body.className = 'message-content';

            if (role === 'assistant' && typeof marked !== 'undefined') {
                body.innerHTML = marked.parse(content);
            } else {
                body.textContent = content;
            }

            div.appendChild(header);
            div.appendChild(body);
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function addToolCallCard(tc) {
            const card = document.createElement('div');
            const statusClass = tc.error ? 'status-error' : 'status-done';
            const statusLabel = tc.error ? 'Err' : 'Done';
            card.className = `tool-call-card ${statusClass}`;

            const argsPreview = tc.arguments || '';
            const resultPreview = tc.result || '(无结果)';
            const elapsedStr = formatElapsed(tc.elapsedMs);

            card.innerHTML = `
                <div class="tool-call-header" onclick="this.nextElementSibling.classList.toggle('open'); this.querySelector('.tool-call-chevron').classList.toggle('open');">
                    <span class="tool-call-chevron">&#x25B6;</span>
                    <span class="tool-call-icon"></span>
                    <span class="tool-call-name">${escapeHtml(tc.toolName)}</span>
                    <span class="tool-call-args">${escapeHtml(truncate(argsPreview, 80))}</span>
                    <span class="tool-call-status">${statusLabel}</span>
                    <span class="tool-call-elapsed">${elapsedStr}</span>
                </div>
                <div class="tool-call-body">
                    ${tc.arguments ? `<div class="tool-call-section">
                        <div class="tool-call-label">参数</div>
                        <div class="tool-call-value">${escapeHtml(tc.arguments)}</div>
                    </div>` : ''}
                    ${tc.result ? `<div class="tool-call-section">
                        <div class="tool-call-label">结果</div>
                        <div class="tool-call-value">${escapeHtml(truncate(tc.result, 2000))}</div>
                    </div>` : ''}
                    ${tc.error ? `<div class="tool-call-section">
                        <div class="tool-call-label">错误</div>
                        <div class="tool-call-value error">${escapeHtml(tc.error)}</div>
                    </div>` : ''}
                </div>
            `;

            chatContainer.appendChild(card);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showTypingIndicator() {
            typingIndicator.style.display = 'block';
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function hideTypingIndicator() {
            typingIndicator.style.display = 'none';
        }

        function generateSessionId() {
            return 'session-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
        }

        function formatTime(ts) {
            if (!ts) return '';
            const d = new Date(ts);
            const now = new Date();
            const diffMs = now - d;
            if (diffMs < 60000) return '刚刚';
            if (diffMs < 3600000) return Math.floor(diffMs / 60000) + '分钟前';
            if (diffMs < 86400000) return Math.floor(diffMs / 3600000) + '小时前';
            return d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function formatElapsed(ms) {
            if (!ms || ms === 0) return '';
            if (ms < 1000) return ms + 'ms';
            return (ms / 1000).toFixed(1) + 's';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function truncate(str, maxLen) {
            if (!str) return '';
            return str.length > maxLen ? str.substring(0, maxLen) + '...' : str;
        }

        // ── 模式切换 ──

        let currentAssistantBody = null;
        let currentTextBuffer = '';

        function appendToAssistantBuffer(text) {
            hideTypingIndicator();
            if (!currentAssistantBody) {
                // 找不到正在编辑的助手消息时创建一个新的
                const assistantDiv = document.createElement('div');
                assistantDiv.className = 'message assistant-message';
                const header = document.createElement('div');
                header.className = 'message-header';
                header.textContent = '助手';
                const body = document.createElement('div');
                body.className = 'message-content';
                assistantDiv.appendChild(header);
                assistantDiv.appendChild(body);
                chatContainer.appendChild(assistantDiv);
                currentAssistantBody = body;
                currentTextBuffer = '';
            }
            currentTextBuffer += text;
            if (typeof marked !== 'undefined') {
                currentAssistantBody.innerHTML = marked.parse(currentTextBuffer);
            } else {
                currentAssistantBody.textContent = currentTextBuffer;
            }
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function toggleMode() {
            const modeLabel = document.getElementById('modeLabel');
            const modeToggle = document.getElementById('modeToggle');
            if (wsMode === 'ws') {
                wsMode = 'sse';
                modeLabel.textContent = 'SSE';
                modeToggle.classList.add('sse-mode');
                if (wsSocket) { wsSocket.close(); wsSocket = null; }
                if (wsReconnectTimer) { clearTimeout(wsReconnectTimer); wsReconnectTimer = null; }
                addMessageToChat('system', '已切换到 SSE 模式');
            } else {
                wsMode = 'ws';
                modeLabel.textContent = 'WS';
                modeToggle.classList.remove('sse-mode');
                connectWebSocket();
                addMessageToChat('system', '已切换到 WebSocket 模式');
            }
            localStorage.setItem('hermes-mode', wsMode);
        }

        function loadModePreference() {
            const saved = localStorage.getItem('hermes-mode');
            const modeLabel = document.getElementById('modeLabel');
            const modeToggle = document.getElementById('modeToggle');
            if (saved === 'sse') {
                wsMode = 'sse';
                modeLabel.textContent = 'SSE';
                modeToggle.classList.add('sse-mode');
            } else {
                wsMode = 'ws';
                connectWebSocket();
            }
        }
    </script>
</body>
</html>
