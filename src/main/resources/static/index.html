<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermes Agent - AI智能体</title>
    <!-- Markdown 渲染 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            color: #333;
        }

        .app-wrapper {
            display: flex;
            width: 100%;
            max-width: 1100px;
            height: 90vh;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        /* ── 侧边栏 ── */
        .sidebar {
            width: 260px;
            background: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 1.2rem;
            border-bottom: 1px solid #2a2a4a;
        }

        .sidebar-header h2 {
            font-size: 1.1rem;
            margin-bottom: 0.8rem;
        }

        .new-session-btn {
            width: 100%;
            padding: 0.6rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: opacity 0.2s;
        }

        .new-session-btn:hover { opacity: 0.85; }

        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .session-item {
            padding: 0.7rem 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 2px;
            transition: background 0.15s;
        }

        .session-item:hover {
            background: #2a2a4a;
        }

        .session-item.active {
            background: #667eea;
            color: white;
        }

        .session-icon {
            font-size: 1rem;
            flex-shrink: 0;
        }

        .session-info {
            flex: 1;
            min-width: 0;
        }

        .session-title {
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .session-time {
            font-size: 0.7rem;
            opacity: 0.6;
        }

        .session-actions {
            display: none;
            gap: 4px;
            flex-shrink: 0;
        }

        .session-item:hover .session-actions {
            display: flex;
        }

        .session-action-btn {
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 0.85rem;
            padding: 2px 4px;
            border-radius: 4px;
            transition: background 0.15s;
        }

        .session-action-btn:hover {
            background: rgba(255,255,255,0.15);
            color: white;
        }

        .session-action-btn.delete-btn:hover {
            background: rgba(220,50,50,0.3);
            color: #ff6b6b;
        }

        /* ── 主区域 ── */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.3rem;
            font-weight: 600;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .action-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            cursor: pointer;
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            font-size: 0.8rem;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .action-btn:hover { background: rgba(255,255,255,0.25); }
        .action-btn.hidden { display: none; }

        .current-session-info {
            font-size: 0.8rem;
            opacity: 0.85;
        }

        .status {
            background: #4CAF50;
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 80%;
            padding: 0.8rem 1.2rem;
            border-radius: 18px;
            line-height: 1.5;
        }

        .user-message {
            background: #667eea;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .assistant-message {
            background: #f0f0f0;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .system-message {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            color: #666;
            align-self: center;
            font-size: 0.85rem;
            font-style: italic;
            max-width: 90%;
            text-align: center;
        }

        .message-header {
            font-size: 0.75rem;
            opacity: 0.8;
            margin-bottom: 0.3rem;
        }

        /* Markdown 内容样式 */
        .message-content pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 0.8rem 1rem;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 0.85rem;
            line-height: 1.4;
            margin: 0.5rem 0;
        }

        .message-content code {
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
            font-size: 0.85em;
        }

        .message-content p { margin: 0.4rem 0; }
        .message-content ul, .message-content ol {
            padding-left: 1.2rem;
            margin: 0.3rem 0;
        }
        .message-content blockquote {
            border-left: 3px solid #667eea;
            padding-left: 0.8rem;
            margin: 0.3rem 0;
            color: #666;
        }
        .message-content h1, .message-content h2, .message-content h3, .message-content h4 {
            margin: 0.6rem 0 0.3rem 0;
            font-weight: 600;
        }
        .message-content h1 { font-size: 1.2rem; }
        .message-content h2 { font-size: 1.1rem; }
        .message-content h3 { font-size: 1rem; }
        .message-content h4 { font-size: 0.95rem; }
        .message-content a {
            color: #667eea;
            text-decoration: underline;
        }
        .message-content hr {
            border: none;
            border-top: 1px solid #ddd;
            margin: 0.8rem 0;
        }
        .message-content table {
            border-collapse: collapse;
            margin: 0.5rem 0;
            font-size: 0.9rem;
        }
        .message-content th, .message-content td {
            border: 1px solid #ddd;
            padding: 0.4rem 0.6rem;
        }
        .message-content th {
            background: #f5f5f5;
            font-weight: 600;
        }

        /* ── 工具调用卡片 ── */
        .tool-call-card {
            align-self: flex-start;
            max-width: 80%;
            width: 100%;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            overflow: hidden;
            background: #fafafa;
        }

        .tool-call-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 0.8rem;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.15s;
            user-select: none;
        }

        .tool-call-header:hover {
            background: #f0f0f0;
        }

        .tool-call-chevron {
            font-size: 0.7rem;
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        .tool-call-chevron.open {
            transform: rotate(90deg);
        }

        .tool-call-icon {
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .tool-call-name {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-weight: 600;
            flex-shrink: 0;
        }

        .tool-call-args {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.75rem;
            color: #888;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            min-width: 0;
        }

        .tool-call-status {
            flex-shrink: 0;
            font-size: 0.85rem;
        }

        .tool-call-elapsed {
            font-size: 0.7rem;
            color: #999;
            font-family: monospace;
            flex-shrink: 0;
        }

        .tool-call-body {
            display: none;
            border-top: 1px solid #e0e0e0;
            padding: 0.6rem 0.8rem;
            font-size: 0.8rem;
        }

        .tool-call-body.open {
            display: block;
        }

        .tool-call-section {
            margin-bottom: 0.5rem;
        }

        .tool-call-section:last-child {
            margin-bottom: 0;
        }

        .tool-call-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #999;
            margin-bottom: 0.2rem;
        }

        .tool-call-value {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.75rem;
            color: #555;
            white-space: pre-wrap;
            word-break: break-all;
            background: #f5f5f5;
            padding: 0.4rem 0.6rem;
            border-radius: 4px;
            max-height: 200px;
            overflow-y: auto;
        }

        .tool-call-value.error {
            color: #d32f2f;
            background: #fef2f2;
        }

        /* 工具调用状态颜色 */
        .tool-call-card.status-done {
            border-color: #c8e6c9;
            background: #f9fbe7;
        }
        .tool-call-card.status-done .tool-call-status { color: #2e7d32; }

        .tool-call-card.status-error {
            border-color: #ffcdd2;
            background: #fff3e0;
        }
        .tool-call-card.status-error .tool-call-status { color: #d32f2f; }

        .input-area {
            padding: 1rem 1.5rem;
            border-top: 1px solid #e9ecef;
            background: #f8f9fa;
        }

        .input-wrapper {
            display: flex;
            gap: 0.8rem;
        }

        #messageInput {
            flex: 1;
            padding: 0.7rem 1rem;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        #messageInput:focus { border-color: #667eea; }

        #sendButton {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 0 1.5rem;
            border-radius: 10px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: transform 0.15s, opacity 0.15s;
        }

        #sendButton:hover { transform: translateY(-1px); opacity: 0.9; }
        #sendButton:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .typing-indicator {
            display: none;
            padding: 0.8rem 1.2rem;
            background: #f0f0f0;
            border-radius: 18px;
            align-self: flex-start;
            color: #666;
            font-style: italic;
            font-size: 0.85rem;
        }

        .typing-dots { animation: typing 1.5s infinite; }

        @keyframes typing {
            0%, 60%, 100% { opacity: 0.3; }
            30% { opacity: 1; }
        }

        .footer {
            padding: 0.5rem 1.5rem;
            background: #f8f9fa;
            border-top: 1px solid #e9ecef;
            text-align: center;
            font-size: 0.75rem;
            color: #999;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            body { padding: 0; }
            .app-wrapper {
                flex-direction: column;
                height: 100vh;
                border-radius: 0;
            }
            .sidebar {
                width: 100%;
                max-height: 200px;
                flex-direction: row;
                overflow: hidden;
            }
            .sidebar-header {
                border-bottom: none;
                border-right: 1px solid #2a2a4a;
                padding: 0.8rem;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
            .session-list {
                display: flex;
                gap: 4px;
                padding: 0.5rem;
                overflow-x: auto;
            }
            .session-item {
                white-space: nowrap;
                min-width: 120px;
            }
        }

        /* 标题编辑弹窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.visible { display: flex; }

        .modal {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            width: 320px;
            max-width: 90vw;
        }

        .modal h3 {
            margin-bottom: 1rem;
            font-size: 1rem;
        }

        .modal input {
            width: 100%;
            padding: 0.6rem;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
        }

        .modal input:focus { border-color: #667eea; }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .modal-btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .modal-btn.cancel { background: #e9ecef; color: #333; }
        .modal-btn.confirm { background: #667eea; color: white; }
        .modal-btn.danger { background: #d32f2f; color: white; }

        /* 人设弹窗样式 */
        .modal-wide { width: 560px; max-width: 95vw; }
        .persona-hint { font-size: 0.8rem; color: #888; margin: 0.5rem 0 0.8rem; }
        #personaContent {
            width: 100%;
            min-height: 180px;
            padding: 0.8rem;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: inherit;
            line-height: 1.5;
            resize: vertical;
            outline: none;
        }
        #personaContent:focus { border-color: #667eea; }
        .persona-status {
            font-size: 0.8rem;
            margin-top: 0.5rem;
            min-height: 1.2em;
        }
        .persona-status.error { color: #d32f2f; }
        .persona-status.ok { color: #2e7d32; }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>会话列表</h2>
                <button class="new-session-btn" id="newSessionBtn">+ 新建会话</button>
            </div>
            <div class="session-list" id="sessionList">
                <!-- 会话列表动态生成 -->
            </div>
        </div>

        <!-- 主区域 -->
        <div class="main-area">
            <div class="header">
                <h1>Hermes Agent</h1>
                <div class="header-right">
                    <button class="action-btn hidden" id="compressBtn" title="上下文压缩">&#x1F5DC; 压缩</button>
                    <button class="action-btn hidden" id="clearHistoryBtn" title="清除历史">&#x1F9F9; 清空</button>
                    <button class="action-btn" id="settingsBtn" title="人设设置">&#x2699; 设置</button>
                    <span class="current-session-info" id="currentSessionInfo"></span>
                    <span class="status" id="connectionStatus">连接中...</span>
                </div>
            </div>

            <div class="chat-container" id="chatContainer">
                <div class="message system-message">
                    <div class="message-header">系统提示</div>
                    <div class="message-content">
                        欢迎使用 Hermes Agent！基于 Spring Boot + Spring AI + SQLite 持久化。
                    </div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="messageInput" placeholder="输入您的问题..." autocomplete="off">
                    <button id="sendButton" disabled>发送</button>
                </div>
            </div>

            <div class="typing-indicator" id="typingIndicator">
                <span class="typing-dots">AI 正在思考...</span>
            </div>

            <div class="footer">
                <a href="/api/conversations/health" target="_blank">API 健康检查</a>
            </div>
        </div>
    </div>

    <!-- 标题编辑弹窗 -->
    <div class="modal-overlay" id="titleModal">
        <div class="modal">
            <h3>重命名会话</h3>
            <input type="text" id="titleInput" placeholder="输入新标题">
            <div class="modal-actions">
                <button class="modal-btn cancel" id="titleCancelBtn">取消</button>
                <button class="modal-btn confirm" id="titleConfirmBtn">确认</button>
            </div>
        </div>
    </div>

    <!-- 人设设置弹窗 -->
    <div class="modal-overlay" id="personaModal">
        <div class="modal modal-wide">
            <h3>AI 人设（SOUL.md）</h3>
            <p class="persona-hint">定义 AI 智能体的身份、沟通风格和行为准则。内容将在每次对话时注入系统提示。</p>
            <textarea id="personaContent" placeholder="例如：你是资深 Java 工程师，擅长代码审查，回复要简洁直接..."></textarea>
            <div class="persona-status" id="personaStatus"></div>
            <div class="modal-actions">
                <button class="modal-btn cancel" id="personaResetBtn">恢复默认</button>
                <button class="modal-btn cancel" id="personaCancelBtn">取消</button>
                <button class="modal-btn confirm" id="personaSaveBtn">保存</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/conversations';
        let currentSessionId = null;
        let sessionsCache = [];

        // DOM
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const typingIndicator = document.getElementById('typingIndicator');
        const connectionStatus = document.getElementById('connectionStatus');
        const sessionList = document.getElementById('sessionList');
        const currentSessionInfo = document.getElementById('currentSessionInfo');
        const newSessionBtn = document.getElementById('newSessionBtn');
        const compressBtn = document.getElementById('compressBtn');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');
        const titleModal = document.getElementById('titleModal');
        const titleInput = document.getElementById('titleInput');
        const titleCancelBtn = document.getElementById('titleCancelBtn');
        const titleConfirmBtn = document.getElementById('titleConfirmBtn');
        const settingsBtn = document.getElementById('settingsBtn');
        const personaModal = document.getElementById('personaModal');
        const personaContent = document.getElementById('personaContent');
        const personaStatus = document.getElementById('personaStatus');
        const personaSaveBtn = document.getElementById('personaSaveBtn');
        const personaCancelBtn = document.getElementById('personaCancelBtn');
        const personaResetBtn = document.getElementById('personaResetBtn');
        let editingSessionId = null;

        // Marked.js 配置
        if (typeof marked !== 'undefined') {
            marked.setOptions({
                breaks: true,
                gfm: true
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            checkHealth();
            setupEventListeners();
        });

        async function checkHealth() {
            try {
                const r = await fetch(`${API_BASE}/health`);
                if (r.ok) {
                    const data = await r.json();
                    connectionStatus.textContent = '已连接';
                    connectionStatus.style.background = '#4CAF50';
                    sendButton.disabled = false;
                    await loadSessions();
                    if (sessionsCache.length > 0) {
                        selectSession(sessionsCache[0].id);
                    } else {
                        createNewSession();
                    }
                } else {
                    connectionStatus.textContent = 'API 不可用';
                    connectionStatus.style.background = '#f44336';
                }
            } catch (e) {
                connectionStatus.textContent = '连接失败';
                connectionStatus.style.background = '#f44336';
            }
        }

        function setupEventListeners() {
            sendButton.addEventListener('click', sendMessage);
            messageInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            messageInput.addEventListener('input', () => {
                sendButton.disabled = messageInput.value.trim() === '';
            });
            newSessionBtn.addEventListener('click', createNewSession);
            compressBtn.addEventListener('click', handleCompress);
            clearHistoryBtn.addEventListener('click', handleClearHistory);

            // 弹窗
            titleCancelBtn.addEventListener('click', closeTitleModal);
            titleConfirmBtn.addEventListener('click', confirmRename);
            titleInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') { e.preventDefault(); confirmRename(); }
                if (e.key === 'Escape') closeTitleModal();
            });
            titleModal.addEventListener('click', (e) => {
                if (e.target === titleModal) closeTitleModal();
            });

            // 人设弹窗
            settingsBtn.addEventListener('click', openPersonaModal);
            personaCancelBtn.addEventListener('click', closePersonaModal);
            personaResetBtn.addEventListener('click', handlePersonaReset);
            personaSaveBtn.addEventListener('click', handlePersonaSave);
            personaContent.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closePersonaModal();
            });
            personaModal.addEventListener('click', (e) => {
                if (e.target === personaModal) closePersonaModal();
            });
        }

        // ── 会话管理 ──

        async function loadSessions() {
            try {
                const r = await fetch(API_BASE);
                if (r.ok) {
                    sessionsCache = await r.json();
                    renderSessionList();
                }
            } catch (e) {
                console.error('Load sessions failed:', e);
            }
        }

        function renderSessionList() {
            sessionList.innerHTML = '';
            for (const s of sessionsCache) {
                const div = document.createElement('div');
                div.className = 'session-item' + (s.id === currentSessionId ? ' active' : '');
                div.innerHTML = `
                    <span class="session-icon">💬</span>
                    <div class="session-info">
                        <div class="session-title">${escapeHtml(s.title || '新会话')}</div>
                        <div class="session-time">${formatTime(s.updatedAt)}</div>
                    </div>
                    <div class="session-actions">
                        <button class="session-action-btn rename-btn" data-id="${s.id}" title="重命名">&#x270F;</button>
                        <button class="session-action-btn delete-btn" data-id="${s.id}" title="删除">&#x1F5D1;</button>
                    </div>
                `;
                div.querySelector('.session-info').addEventListener('click', () => selectSession(s.id));
                div.querySelector('.rename-btn').addEventListener('click', (e) => {
                    e.stopPropagation();
                    openTitleModal(s.id, s.title);
                });
                div.querySelector('.delete-btn').addEventListener('click', async (e) => {
                    e.stopPropagation();
                    if (confirm('确定删除此会话？')) {
                        await deleteSession(s.id);
                    }
                });
                sessionList.appendChild(div);
            }
        }

        async function createNewSession() {
            try {
                const r = await fetch(`${API_BASE}/session`, { method: 'POST' });
                if (r.ok) {
                    const session = await r.json();
                    currentSessionId = session.id;
                    chatContainer.innerHTML = '';
                    addMessageToChat('system', '新会话已创建');
                    updateSessionInfo();
                    updateActionButtons();
                    await loadSessions();
                    messageInput.focus();
                    return;
                }
            } catch (e) {
                console.error('Create session failed:', e);
            }
            // 降级方案：前端生成 ID
            currentSessionId = generateSessionId();
            chatContainer.innerHTML = '';
            addMessageToChat('system', '新会话已创建');
            updateSessionInfo();
            renderSessionList();
            messageInput.focus();
        }

        async function selectSession(id) {
            currentSessionId = id;
            chatContainer.innerHTML = '';
            updateSessionInfo();
            updateActionButtons();
            renderSessionList();

            try {
                const r = await fetch(`${API_BASE}/${id}/history`);
                if (r.ok) {
                    const msgs = await r.json();
                    chatContainer.innerHTML = '';
                    if (msgs.length === 0) {
                        addMessageToChat('system', '此会话暂无历史消息');
                    } else {
                        for (const m of msgs) {
                            const role = m.messageType ? m.messageType.toLowerCase() : 'system';
                            if (role === 'user' || role === 'assistant') {
                                addMessageToChat(role, m.text || '');
                            } else if (role === 'tool') {
                                // 历史中的工具消息以系统消息展示
                                addMessageToChat('system', '[工具] ' + (m.text || ''));
                            }
                        }
                    }
                }
            } catch (e) {
                console.error('Load history failed:', e);
            }
            messageInput.focus();
        }

        async function deleteSession(id) {
            try {
                const r = await fetch(`${API_BASE}/${id}`, { method: 'DELETE' });
                if (r.ok) {
                    sessionsCache = sessionsCache.filter(s => s.id !== id);
                    renderSessionList();
                    if (currentSessionId === id) {
                        if (sessionsCache.length > 0) {
                            selectSession(sessionsCache[0].id);
                        } else {
                            createNewSession();
                        }
                    }
                }
            } catch (e) {
                console.error('Delete session failed:', e);
            }
        }

        function openTitleModal(id, currentTitle) {
            editingSessionId = id;
            titleInput.value = currentTitle || '';
            titleModal.classList.add('visible');
            setTimeout(() => titleInput.focus(), 100);
        }

        function closeTitleModal() {
            titleModal.classList.remove('visible');
            editingSessionId = null;
        }

        async function confirmRename() {
            if (!editingSessionId) return;
            const title = titleInput.value.trim();
            if (!title) return;

            try {
                const r = await fetch(`${API_BASE}/${editingSessionId}/title`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title })
                });
                if (r.ok) {
                    const sess = sessionsCache.find(s => s.id === editingSessionId);
                    if (sess) sess.title = title;
                    renderSessionList();
                    updateSessionInfo();
                }
            } catch (e) {
                console.error('Rename failed:', e);
            }
            closeTitleModal();
        }

        // ── 人设设置 ──

        async function openPersonaModal() {
            personaModal.classList.add('visible');
            personaStatus.textContent = '';
            personaStatus.className = 'persona-status';
            personaContent.value = '(加载中...)';
            personaContent.disabled = true;
            try {
                const r = await fetch('/api/settings/persona');
                if (r.ok) {
                    const data = await r.json();
                    personaContent.value = data.content || '';
                } else {
                    personaContent.value = '';
                }
            } catch (e) {
                personaContent.value = '';
                personaStatus.textContent = '加载失败: ' + e.message;
                personaStatus.className = 'persona-status error';
            }
            personaContent.disabled = false;
            setTimeout(() => personaContent.focus(), 100);
        }

        function closePersonaModal() {
            personaModal.classList.remove('visible');
        }

        async function handlePersonaSave() {
            const content = personaContent.value;
            if (!content.trim()) {
                personaStatus.textContent = '人设内容不能为空';
                personaStatus.className = 'persona-status error';
                return;
            }
            personaSaveBtn.disabled = true;
            personaStatus.textContent = '保存中...';
            personaStatus.className = 'persona-status';
            try {
                const r = await fetch('/api/settings/persona', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content })
                });
                const data = await r.json();
                if (r.ok && data.success) {
                    personaStatus.textContent = data.message || '已保存';
                    personaStatus.className = 'persona-status ok';
                    setTimeout(closePersonaModal, 800);
                } else {
                    personaStatus.textContent = data.message || '保存失败';
                    personaStatus.className = 'persona-status error';
                }
            } catch (e) {
                personaStatus.textContent = '保存失败: ' + e.message;
                personaStatus.className = 'persona-status error';
            } finally {
                personaSaveBtn.disabled = false;
            }
        }

        async function handlePersonaReset() {
            if (!confirm('确定删除人设文件，恢复默认身份？')) return;
            personaSaveBtn.disabled = true;
            try {
                const r = await fetch('/api/settings/persona', { method: 'DELETE' });
                const data = await r.json();
                if (r.ok && data.success) {
                    personaContent.value = '';
                    personaStatus.textContent = data.message || '已恢复默认';
                    personaStatus.className = 'persona-status ok';
                    setTimeout(closePersonaModal, 800);
                } else {
                    personaStatus.textContent = data.message || '重置失败';
                    personaStatus.className = 'persona-status error';
                }
            } catch (e) {
                personaStatus.textContent = '重置失败: ' + e.message;
                personaStatus.className = 'persona-status error';
            } finally {
                personaSaveBtn.disabled = false;
            }
        }

        function updateSessionInfo() {
            const sess = sessionsCache.find(s => s.id === currentSessionId);
            if (sess) {
                currentSessionInfo.textContent = sess.title || '新会话';
            } else {
                currentSessionInfo.textContent = currentSessionId ? currentSessionId.slice(0, 8) + '...' : '';
            }
        }

        function updateActionButtons() {
            // 有当前会话时才显示操作按钮
            const hasSession = currentSessionId != null && sessionsCache.length > 0;
            compressBtn.classList.toggle('hidden', !hasSession);
            clearHistoryBtn.classList.toggle('hidden', !hasSession);
        }

        // ── 压缩 & 清空历史 ──

        async function handleCompress() {
            if (!currentSessionId) return;
            try {
                const r = await fetch(`${API_BASE}/${currentSessionId}/compress`, { method: 'POST' });
                if (r.ok) {
                    const data = await r.json();
                    addMessageToChat('system', `上下文压缩完成：${data.messagesBefore} → ${data.messagesAfter} 条消息（删除 ${data.messagesRemoved} 条）`);
                } else {
                    addMessageToChat('system', '压缩失败，会话不存在');
                }
            } catch (e) {
                addMessageToChat('system', '压缩请求失败: ' + e.message);
            }
        }

        async function handleClearHistory() {
            if (!currentSessionId) return;
            if (!confirm('确定清除此会话的全部历史消息？')) return;
            try {
                const r = await fetch(`${API_BASE}/${currentSessionId}/history`, { method: 'DELETE' });
                if (r.ok) {
                    chatContainer.innerHTML = '';
                    addMessageToChat('system', '历史消息已清除');
                }
            } catch (e) {
                addMessageToChat('system', '清除历史失败: ' + e.message);
            }
        }

        // ── 发送消息（流式） ──

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || !currentSessionId) return;

            messageInput.value = '';
            sendButton.disabled = true;
            addMessageToChat('user', message);
            showTypingIndicator();

            // 创建助手消息气泡（流式渲染用）
            const assistantDiv = document.createElement('div');
            assistantDiv.className = 'message assistant-message';
            const header = document.createElement('div');
            header.className = 'message-header';
            header.textContent = '助手';
            const body = document.createElement('div');
            body.className = 'message-content';
            assistantDiv.appendChild(header);
            assistantDiv.appendChild(body);
            chatContainer.appendChild(assistantDiv);

            let textBuffer = '';

            function handleSSEEvent(eventType, data) {
                if (eventType === 'tool') {
                    const tc = JSON.parse(data);
                    addToolCallCard(tc);
                } else if (eventType === 'text') {
                    textBuffer += data;
                    if (typeof marked !== 'undefined') {
                        body.innerHTML = marked.parse(textBuffer);
                    } else {
                        body.textContent = textBuffer;
                    }
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                } else if (eventType === 'done') {
                    hideTypingIndicator();
                } else if (eventType === 'error') {
                    hideTypingIndicator();
                    addMessageToChat('system', `错误: ${data}`);
                }
            }

            try {
                const response = await fetch(`${API_BASE}/stream`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, sessionId: currentSessionId })
                });

                if (!response.ok) {
                    hideTypingIndicator();
                    addMessageToChat('system', `错误: HTTP ${response.status}`);
                    return;
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let rawBuffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    rawBuffer += decoder.decode(value, { stream: true });
                    // SSE 事件以空行分隔
                    const parts = rawBuffer.split('\n\n');
                    rawBuffer = parts.pop(); // 保留未完成的片段

                    for (const part of parts) {
                        const lines = part.split('\n');
                        let eventType = 'message'; // SSE 默认事件类型
                        let dataLines = [];

                        for (const line of lines) {
                            const trimmed = line.trim();
                            if (!trimmed || trimmed.startsWith(':')) continue;

                            if (trimmed.startsWith('event:')) {
                                eventType = trimmed.slice(6).trim();
                            } else if (trimmed.startsWith('data:')) {
                                dataLines.push(trimmed.slice(5));
                            }
                        }

                        if (dataLines.length > 0) {
                            const data = dataLines.join('\n');
                            handleSSEEvent(eventType, data);
                        }
                    }
                }

            } catch (e) {
                hideTypingIndicator();
                addMessageToChat('system', `网络错误: ${e.message}`);
                return;
            }

            hideTypingIndicator();
            await loadSessions();
            messageInput.focus();
        }

        // ── UI 辅助 ──

        function addMessageToChat(role, content) {
            const div = document.createElement('div');
            div.className = `message ${role}-message`;
            const header = document.createElement('div');
            header.className = 'message-header';
            header.textContent = role === 'user' ? '用户' : role === 'assistant' ? '助手' : '系统';
            const body = document.createElement('div');
            body.className = 'message-content';

            if (role === 'assistant' && typeof marked !== 'undefined') {
                body.innerHTML = marked.parse(content);
            } else {
                body.textContent = content;
            }

            div.appendChild(header);
            div.appendChild(body);
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function addToolCallCard(tc) {
            const card = document.createElement('div');
            const statusClass = tc.error ? 'status-error' : 'status-done';
            card.className = `tool-call-card ${statusClass}`;

            const argsPreview = tc.arguments || '';
            const resultPreview = tc.result || '(无结果)';
            const statusIcon = tc.error ? '✗' : '✓';
            const elapsedStr = formatElapsed(tc.elapsedMs);

            card.innerHTML = `
                <div class="tool-call-header" onclick="this.nextElementSibling.classList.toggle('open'); this.querySelector('.tool-call-chevron').classList.toggle('open');">
                    <span class="tool-call-chevron">&#x25B6;</span>
                    <span class="tool-call-icon">&#x26A1;</span>
                    <span class="tool-call-name">${escapeHtml(tc.toolName)}</span>
                    <span class="tool-call-args">${escapeHtml(truncate(argsPreview, 80))}</span>
                    <span class="tool-call-status">${statusIcon}</span>
                    <span class="tool-call-elapsed">${elapsedStr}</span>
                </div>
                <div class="tool-call-body">
                    ${tc.arguments ? `<div class="tool-call-section">
                        <div class="tool-call-label">参数</div>
                        <div class="tool-call-value">${escapeHtml(tc.arguments)}</div>
                    </div>` : ''}
                    ${tc.result ? `<div class="tool-call-section">
                        <div class="tool-call-label">结果</div>
                        <div class="tool-call-value">${escapeHtml(truncate(tc.result, 2000))}</div>
                    </div>` : ''}
                    ${tc.error ? `<div class="tool-call-section">
                        <div class="tool-call-label">错误</div>
                        <div class="tool-call-value error">${escapeHtml(tc.error)}</div>
                    </div>` : ''}
                </div>
            `;

            chatContainer.appendChild(card);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showTypingIndicator() {
            typingIndicator.style.display = 'block';
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function hideTypingIndicator() {
            typingIndicator.style.display = 'none';
        }

        function generateSessionId() {
            return 'session-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
        }

        function formatTime(ts) {
            if (!ts) return '';
            const d = new Date(ts);
            const now = new Date();
            const diffMs = now - d;
            if (diffMs < 60000) return '刚刚';
            if (diffMs < 3600000) return Math.floor(diffMs / 60000) + '分钟前';
            if (diffMs < 86400000) return Math.floor(diffMs / 3600000) + '小时前';
            return d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function formatElapsed(ms) {
            if (!ms || ms === 0) return '';
            if (ms < 1000) return ms + 'ms';
            return (ms / 1000).toFixed(1) + 's';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function truncate(str, maxLen) {
            if (!str) return '';
            return str.length > maxLen ? str.substring(0, maxLen) + '...' : str;
        }
    </script>
</body>
</html>
