server:
  port: 8080

spring:
  application:
    name: hermes-agent

  main:
    allow-bean-definition-overriding: true

  # SQLite configuration
  datasource:
    url: jdbc:sqlite:${user.home}/.hermes/hermes.db
    driver-class-name: org.sqlite.JDBC

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect

  # Spring AI OpenAI configuration (兼容百炼 DashScope)
  ai:
    openai:
      api-key: ${DASHSCOPE_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
      chat:
        options:
          model: ${AI_MODEL:qwen-plus}
          temperature: 0.7
          max-tokens: 2000

logging:
  level:
    com.hermes.agent: DEBUG
    org.springframework: INFO
    org.springframework.ai: DEBUG
    org.springframework.ai.retry: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

hermes:
  agent:
    max-iterations: 10
    session-timeout-minutes: 30
    default-system-prompt: |-
      你是 Hermes Agent，一个由 Wang Bowen 创建的智能 AI 助手。
      你是一个可成长的、自我改进的 AI 智能体，能够通过工具调用与环境交互，并通过学习和记忆不断进化。
    context-compression:
      enabled: true
      threshold-percent: 0.75
      protect-first-n: 3
      protect-last-n: 6
      tail-token-budget: 20000
      context-length: 128000
  tools:
    toolsets:
      active:
        - datetime
        - echo
        - file
        - terminal
      all:
        datetime:
          description: "日期时间工具"
          enabled: true
        echo:
          description: "回声测试工具"
          enabled: true
        file:
          description: "文件操作工具（读写、替换、搜索）"
          enabled: true
        terminal:
          description: "终端命令执行"
          enabled: true
    terminal:
      timeout-seconds: 60
